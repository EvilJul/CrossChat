<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 桌面外框 -->
  <rect x="8" y="6" width="48" height="38" rx="5" fill="#475569" stroke="#334155" stroke-width="2"/>
  <!-- 屏幕 -->
  <rect x="12" y="10" width="40" height="28" rx="2" fill="#f8fafc"/>
  <!-- 底座 -->
  <rect x="24" y="44" width="16" height="4" rx="2" fill="#64748b"/>
  <rect x="28" y="48" width="8" height="3" rx="1.5" fill="#94a3b8"/>
  <!-- 屏幕内容：斜杠 + 光标 -->
  <text x="22" y="31" font-family="monospace" font-size="14" font-weight="bold" fill="#475569">/</text>
  <rect x="30" y="20" width="2" height="12" rx="1" fill="#64748b" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
