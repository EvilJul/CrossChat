name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*", "Beta*"]
  pull_request:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Cache Python environment
        id: cache-python
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/python
          key: python-embed-windows-3.11.9
          restore-keys: |
            python-embed-windows-

      - name: Setup Python sandbox environment
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          cd src-tauri/resources
          python setup_python.py
        shell: bash

      - name: Verify Python environment
        run: |
          ./src-tauri/resources/python/python.exe --version
          ./src-tauri/resources/python/python.exe -m pip --version
        shell: bash

      - name: Install Python dependencies
        run: |
          cd src-tauri/resources
          python/python.exe install_office_deps.py
        shell: bash

      - name: Build Tauri app
        run: npm run tauri build

      - name: Check bundle size
        run: |
          echo "=== Windows Build Artifacts Size ==="
          du -sh src-tauri/target/release/bundle/msi/*.msi || echo "No MSI files"
          du -sh src-tauri/target/release/bundle/nsis/*.exe || echo "No NSIS files"
        shell: bash

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Cache Python environment
        id: cache-python
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/python
          key: python-embed-linux-3.11.7
          restore-keys: |
            python-embed-linux-

      - name: Setup Python sandbox environment
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          cd src-tauri/resources
          python setup_python.py

      - name: Verify Python environment
        run: |
          ./src-tauri/resources/python/bin/python3 --version
          ./src-tauri/resources/python/bin/python3 -m pip --version

      - name: Install Python dependencies
        run: |
          cd src-tauri/resources
          python/bin/python3 install_office_deps.py

      - name: Build Tauri app
        run: npm run tauri build -- --bundles deb,rpm
        continue-on-error: false

      - name: Check bundle size
        run: |
          echo "=== Linux Build Artifacts Size ==="
          du -sh src-tauri/target/release/bundle/deb/*.deb || echo "No DEB files"
          du -sh src-tauri/target/release/bundle/rpm/*.rpm || echo "No RPM files"

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload Linux rpm
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-installer/*.msi
            windows-exe/*.exe
            linux-deb/*.deb
            linux-rpm/*.rpm
          draft: false
          prerelease: ${{ contains(github.ref, 'Beta') }}
          generate_release_notes: true
