<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 简化版图标，适用于小尺寸 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sparkleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆角矩形背景 -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)"/>
  
  <!-- 简化的聊天气泡 -->
  <g opacity="0.3">
    <rect x="100" y="160" width="180" height="80" rx="20" fill="#FFFFFF"/>
    <rect x="232" y="280" width="180" height="80" rx="20" fill="#FFFFFF"/>
  </g>
  
  <!-- AI Sparkle 图标 - 简化版 -->
  <g transform="translate(256, 256)">
    <!-- 中心圆 -->
    <circle cx="0" cy="0" r="60" fill="url(#sparkleGradient)"/>
    
    <!-- 四个主要光芒 - 更粗更明显 -->
    <rect x="-6" y="-90" width="12" height="30" rx="6" fill="url(#sparkleGradient)"/>
    <rect x="60" y="-6" width="30" height="12" rx="6" fill="url(#sparkleGradient)"/>
    <rect x="-6" y="60" width="12" height="30" rx="6" fill="url(#sparkleGradient)"/>
    <rect x="-90" y="-6" width="30" height="12" rx="6" fill="url(#sparkleGradient)"/>
    
    <!-- 内部高光 -->
    <circle cx="-12" cy="-12" r="20" fill="#FFFFFF" opacity="0.5"/>
  </g>
</svg>
