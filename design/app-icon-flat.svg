<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 简化的扁平化图标，更容易转换为 PNG -->
  
  <!-- 背景 - 纯色紫色 -->
  <rect width="1024" height="1024" rx="230" fill="#7C3AED"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="256" cy="256" r="200" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="768" cy="768" r="180" fill="#FFFFFF" opacity="0.08"/>
  
  <!-- 左侧聊天气泡 -->
  <rect x="200" y="320" width="280" height="120" rx="30" fill="#FFFFFF" opacity="0.25"/>
  
  <!-- 右侧聊天气泡 -->
  <rect x="544" y="520" width="280" height="140" rx="30" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- 中心 AI 星标 -->
  <g transform="translate(512, 512)">
    <!-- 中心圆 -->
    <circle cx="0" cy="0" r="100" fill="#FCD34D"/>
    
    <!-- 四个主要光芒 -->
    <rect x="-12" y="-160" width="24" height="60" rx="12" fill="#FCD34D"/>
    <rect x="100" y="-12" width="60" height="24" rx="12" fill="#FCD34D"/>
    <rect x="-12" y="100" width="24" height="60" rx="12" fill="#FCD34D"/>
    <rect x="-160" y="-12" width="60" height="24" rx="12" fill="#FCD34D"/>
    
    <!-- 四个次要光芒（对角线） -->
    <rect x="70" y="-90" width="16" height="40" rx="8" fill="#FCD34D" transform="rotate(45 78 -70)" opacity="0.8"/>
    <rect x="70" y="50" width="16" height="40" rx="8" fill="#FCD34D" transform="rotate(-45 78 70)" opacity="0.8"/>
    <rect x="-86" y="50" width="16" height="40" rx="8" fill="#FCD34D" transform="rotate(45 -78 70)" opacity="0.8"/>
    <rect x="-86" y="-90" width="16" height="40" rx="8" fill="#FCD34D" transform="rotate(-45 -78 -70)" opacity="0.8"/>
    
    <!-- 高光 -->
    <circle cx="-20" cy="-20" r="35" fill="#FFFFFF" opacity="0.5"/>
  </g>
  
  <!-- 装饰小点 -->
  <circle cx="700" cy="280" r="12" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="760" cy="320" r="8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="280" cy="700" r="10" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="240" cy="740" r="6" fill="#FFFFFF" opacity="0.4"/>
</svg>
